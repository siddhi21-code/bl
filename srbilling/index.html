<!DOCTYPE html>
<html>
<head>
<title>SRBilling</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Segoe UI, sans-serif;
    background: #f3f3f3;
}

header {
    background: #111827;
    color: white;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
}

.container {
    max-width: 900px;
    margin: 20px auto;
    padding: 15px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #111827;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

@media (max-width: 768px) {
    table { font-size: 12px; }
}
</style>
</head>

<body>

<header>SRBilling</header>

<div class="container">

<div class="card">
<h3>Create Invoice</h3>

<input type="text" id="product" placeholder="Product Name">
<input type="number" id="price" placeholder="Price">
<input type="number" id="qty" placeholder="Quantity">

<button onclick="generateBill()">Save Invoice</button>
<button onclick="printBill()">Print Last Bill</button>

</div>

<div class="card">
<h3>All Invoices</h3>
<table>
<thead>
<tr>
<th>Product</th>
<th>Total</th>
<th>Date</th>
</tr>
</thead>
<tbody id="invoiceTable"></tbody>
</table>
</div>

</div>

<script>
let lastInvoice = {};

async function generateBill() {

    let product = document.getElementById("product").value;
    let price = document.getElementById("price").value;
    let qty = document.getElementById("qty").value;
    let total = price * qty;
    let date = new Date().toLocaleDateString();

    await fetch("/addInvoice", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ product, price, qty, total, date })
    });

    lastInvoice = { product, total };

    loadInvoices();
}

async function loadInvoices() {
    const res = await fetch("/getInvoices");
    const data = await res.json();

    const table = document.getElementById("invoiceTable");
    table.innerHTML = "";

    data.forEach(inv => {
        table.innerHTML += `
            <tr>
                <td>${inv.product}</td>
                <td>₹${inv.total}</td>
                <td>${inv.date}</td>
            </tr>
        `;
    });
}

async function printBill() {

    if (!lastInvoice.product) {
        alert("Generate invoice first");
        return;
    }

    await fetch("/print", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(lastInvoice)
    });

    alert("Printed Successfully");
}

loadInvoices();
</script>

</body>
</html>
